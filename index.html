<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduPro — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="bg-shape s1"></div>
    <div class="bg-shape s2"></div>
    <div class="bg-shape s3"></div>
  </div>

  <div class="login-container">
    <div class="login-brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-name">EduPro</span>
    </div>
    <p class="login-subtitle">Plateforme de gestion scolaire</p>

    <div class="login-card">
      <h2 class="login-title">Connexion</h2>
      <div id="login-error" class="alert alert-error hidden"></div>
      <div class="form-group">
        <label>Identifiant</label>
        <input type="text" id="login-username" placeholder="Votre identifiant ou email" autocomplete="off" inputmode="email"/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div style="position:relative">
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" style="padding-right:2.8rem"/>
          <button onclick="togglePassword()" type="button" style="position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem" id="pw-toggle">👁</button>
        </div>
      </div>
      <button class="btn-primary btn-block" id="login-btn" onclick="handleLogin()">Se connecter</button>
      <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
        <div style="font-size:0.78rem;color:var(--text-dim);text-align:center">Rôles disponibles</div>
        <div style="display:flex;gap:0.5rem;justify-content:center;margin-top:0.6rem;flex-wrap:wrap">
          <span class="badge" style="font-size:0.72rem">👤 Élève</span>
          <span class="badge badge-info" style="font-size:0.72rem">🎓 Professeur</span>
          <span style="background:rgba(61,214,140,0.12);color:var(--success);padding:0.25rem 0.7rem;border-radius:20px;font-size:0.72rem;font-weight:600">👨‍👩‍👧 Parent</span>
          <span style="background:rgba(240,92,92,0.12);color:var(--error);padding:0.25rem 0.7rem;border-radius:20px;font-size:0.72rem;font-weight:600">⚙ Admin</span>
        </div>
      </div>
    </div>

    <p class="login-note">Accès réservé aux membres de l'établissement</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD2Xh778RDqztmHPBLcw96DWew03PkL2qU",
      authDomain: "edupro-school.firebaseapp.com",
      projectId: "edupro-school",
      storageBucket: "edupro-school.firebasestorage.app",
      messagingSenderId: "552814359641",
      appId: "1:552814359641:web:2c47cb3835953679776d48"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window._auth = auth;
    window._db = db;
    window._signIn = signInWithEmailAndPassword;
    window._doc = doc;
    window._getDoc = getDoc;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          const role = userDoc.data().role;
          redirectByRole(role);
        }
      }
    });
  </script>
  <script src="login.js"></script>
</body>
</html>
