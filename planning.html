<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduPro — Planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="student-page">

<div class="topbar">
  <button class="hamburger" onclick="openMobileSidebar()">☰</button>
  <div class="topbar-brand"><span class="brand-icon">⚡</span><span class="brand-name">EduPro</span></div>
  <div class="topbar-right"><div class="admin-avatar" id="topbar-avatar-plan">?</div></div>
</div>
<div class="sidebar-overlay"></div>

<aside class="sidebar">
  <div class="sidebar-brand"><span class="brand-icon">⚡</span><span class="brand-name">EduPro</span></div>
  <nav class="sidebar-nav">
    <a href="#" class="nav-item" id="planning-back-link"><span class="nav-icon">🏠</span> Accueil</a>
    <a href="messages.html" class="nav-item"><span class="nav-icon">✉</span> Messages</a>
    <a href="#" class="nav-item active"><span class="nav-icon">📅</span> Planning</a>
  </nav>
  <div class="sidebar-role-badge" id="role-badge-plan">—</div>
  <button class="btn-logout" onclick="logout()"><span>↩</span> Déconnexion</button>
</aside>

<main class="admin-main">
  <div class="admin-header">
    <div><h1>Planning des cours</h1><p>Calendrier hebdomadaire</p></div>
    <div class="admin-user"><span id="plan-user-name">—</span><div class="admin-avatar" id="plan-avatar">?</div></div>
  </div>

  <!-- Navigation semaine -->
  <div class="planning-nav">
    <button class="btn-secondary btn-sm" onclick="changeWeek(-1)">← Préc.</button>
    <div class="week-label" id="week-label">—</div>
    <button class="btn-secondary btn-sm" onclick="changeWeek(1)">Suiv. →</button>
    <select id="planning-group-filter" onchange="renderPlanning()" style="padding:0.4rem 0.8rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);outline:none;font-size:0.85rem;max-width:200px">
      <option value="">— Tous les groupes —</option>
    </select>
    <button class="btn-primary btn-sm admin-teacher-only hidden" onclick="openModal('modal-add-slot')">+ Séance</button>
  </div>

  <!-- Grille planning -->
  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <div class="planning-week" id="planning-week" style="min-width:700px">
      <div class="table-loading" style="grid-column:1/-1">Chargement...</div>
    </div>
  </div>

  <!-- Légende -->
  <div style="display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;font-size:0.78rem;color:var(--text-muted)">
    <div style="display:flex;align-items:center;gap:0.4rem"><div style="width:12px;height:12px;background:var(--accent-muted);border-left:3px solid var(--accent);border-radius:2px"></div>Séance planifiée</div>
    <div style="display:flex;align-items:center;gap:0.4rem"><div style="width:12px;height:12px;background:var(--bg3);border:1px solid var(--border);border-radius:2px"></div>Créneau libre</div>
    <div style="display:flex;align-items:center;gap:0.4rem"><div style="width:12px;height:12px;background:var(--accent-muted);border-radius:2px;border:2px solid var(--accent)"></div>Aujourd'hui</div>
  </div>
</main>

<!-- MODAL: Ajouter séance -->
<div class="modal-overlay hidden" id="modal-add-slot">
  <div class="modal">
    <div class="modal-header">
      <h3>Ajouter une séance</h3>
      <button class="modal-close" onclick="closeModal('modal-add-slot')">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Jour</label>
        <select id="slot-day">
          <option value="0">Lundi</option>
          <option value="1">Mardi</option>
          <option value="2">Mercredi</option>
          <option value="3">Jeudi</option>
          <option value="4">Vendredi</option>
        </select>
      </div>
      <div class="form-group"><label>Horaire</label>
        <select id="slot-time">
          <option>07h00 - 08h30</option>
          <option>08h30 - 10h00</option>
          <option>10h00 - 11h30</option>
          <option>11h30 - 13h00</option>
          <option>14h00 - 15h30</option>
          <option>15h30 - 17h00</option>
          <option>17h00 - 18h30</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Cours / Matière</label><input type="text" id="slot-course" placeholder="Ex: Protection différentielle"/></div>
    <div class="form-row">
      <div class="form-group"><label>Salle</label><input type="text" id="slot-room" placeholder="Ex: Salle A3"/></div>
      <div class="form-group"><label>Groupe</label><select id="slot-group"><option value="">— Choisir —</option></select></div>
    </div>
    <div class="form-group"><label>Semaine (lundi)</label><input type="date" id="slot-week"/></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('modal-add-slot')">Annuler</button>
      <button class="btn-primary" onclick="addSlot()">Ajouter</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, doc, getDoc, getDocs, addDoc, deleteDoc,
    serverTimestamp, query, where, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD2Xh778RDqztmHPBLcw96DWew03PkL2qU",
    authDomain: "edupro-school.firebaseapp.com",
    projectId: "edupro-school",
    storageBucket: "edupro-school.firebasestorage.app",
    messagingSenderId: "552814359641",
    appId: "1:552814359641:web:2c47cb3835953679776d48"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._auth=auth; window._db=db; window._signOut=signOut;
  window._collection=collection; window._doc=doc; window._getDoc=getDoc; window._getDocs=getDocs;
  window._addDoc=addDoc; window._deleteDoc=deleteDoc; window._serverTimestamp=serverTimestamp;
  window._query=query; window._where=where; window._orderBy=orderBy;

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href="index.html"; return; }
    const d = await getDoc(doc(db,"users",user.uid));
    if (!d.exists()) { window.location.href="index.html"; return; }
    const data = d.data();
    window._currentUser = { uid: user.uid, ...data };
    const name = data.fullName || "—";

    document.getElementById("plan-user-name").textContent = name;
    document.getElementById("plan-avatar").textContent = name[0].toUpperCase();
    document.getElementById("topbar-avatar-plan").textContent = name[0].toUpperCase();

    // Lien retour selon rôle
    const backLink = document.getElementById("planning-back-link");
    if (data.role === "admin" || data.role === "teacher") backLink.href = "admin.html";
    else if (data.role === "parent") backLink.href = "parent.html";
    else backLink.href = "dashboard.html";

    const badge = document.getElementById("role-badge-plan");
    if (data.role === "admin" || data.role === "teacher") {
      badge.textContent = data.role === "admin" ? "Administrateur" : "Professeur";
      badge.style.cssText = "background:rgba(64,96,240,0.15);color:#6888f8";
      document.querySelector(".admin-teacher-only").classList.remove("hidden");
    } else if (data.role === "parent") {
      badge.textContent = "Parent";
      badge.style.cssText = "background:rgba(61,214,140,0.12);color:var(--success)";
    } else {
      badge.textContent = "Élève";
    }

    initPlanning();
  });
</script>
<script src="planning.js"></script>
</body>
</html>
